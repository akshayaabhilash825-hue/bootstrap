<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course Progress Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="w-100 p-4">
    
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item"><a href="#">Courses</a></li>
        <li class="breadcrumb-item active" aria-current="page">Web Development</li>
      </ol>
    </nav>

    <h3 class="mb-4">
       
      <span class="badge bg-primary">New</span>
    </h3>

    
    <div class="mb-3">
      <label>HTML</label>
      <div class="progress">
        <div class="progress-bar progress-bar-striped bg-success" style="width: 100%;">100%</div>
      </div>
    </div>

    <div class="mb-3">
      <label>CSS</label>
      <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" style="width: 75%;">75%</div>
      </div>
    </div>

    <div class="mb-3">
      <label>JavaScript</label>
      <div class="progress">
        <div class="progress-bar bg-warning text-dark" style="width: 50%;">50%</div>
      </div>
    </div>

    <div class="mb-3">
      <label>Bootstrap</label>
      <div class="progress">
        <div class="progress-bar bg-danger" style="width: 25%;">25%</div>
      </div>
    </div>

    
    <div class="btn-group my-4" role="group">
      <button class="btn btn-success">Start</button>
      <button class="btn btn-secondary">Pause</button>
      <button class="btn btn-danger">Reset</button>
    </div>

  
    <nav aria-label="Page navigation">
      <ul class="pagination justify-content-center">
        <li class="page-item active"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item disabled"><a class="page-link" href="#">3</a></li>
      </ul>
    </nav>

  </div>

</body>
</html>
