<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Delivery Service</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="bg-light py-3 border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
      <h3 class="mb-0">FoodExpress</h3>
      <nav>
        <a href="#" class="mx-2 text-decoration-none">Home</a>
        <a href="#" class="mx-2 text-decoration-none">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Main Section -->
  <main class="container my-5">
    <div class="row">
      <!-- Left Column -->
      <div class="col-md-8 mb-4">
        <h2>Welcome to FoodExpress</h2>
        <p>
          We deliver delicious meals from your favorite restaurants straight to your doorstep. 
          Fast, reliable, and always fresh — enjoy the convenience of great food without leaving home.
        </p>
      </div>
      <!-- Right Column -->
      <div class="col-md-4 mb-4">
        <img src="https://via.placeholder.com/400x250.png?text=Sample+Food+Image" 
             alt="Sample Food" class="img-fluid rounded shadow">
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">&copy; 2026 FoodExpress. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
